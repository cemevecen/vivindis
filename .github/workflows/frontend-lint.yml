# Çeviri dosyalarında anahtar eşitliği (check-i18n-parity) + ESLint + TypeScript.
name: Frontend lint

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-lint.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-lint.yml"

concurrency:
  group: frontend-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: i18n parity + ESLint
        run: npm run lint

      - name: TypeScript
        run: npx tsc --noEmit
