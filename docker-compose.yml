# Vivindis — yerel tam yığın (Oturum 1 iskelet)
# `cp .env.example .env` sonrası: docker compose up --build
# Compose, boş .env ile bile yerel ağ için güvenli varsayılanlar uygular (yalnızca container içi).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vivindis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vivindis}
      POSTGRES_DB: ${POSTGRES_DB:-vivindis}
    ports:
      # Yerelde 5432 doluysa çakışmayı önlemek için host tarafı 5433.
      - "5433:5432"
    volumes:
      - vivindis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vivindis} -d ${POSTGRES_DB:-vivindis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vivindis:vivindis@postgres:5432/vivindis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      # Yerelde 8000 başka bir servise aitse Vivindis’e 8001 üzerinden erişin.
      - "8001:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install -q -e . &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://vivindis:vivindis@postgres:5432/vivindis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install -q -e . &&
             celery -A app.core.celery:celery_app worker --loglevel=info"

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    ports:
      - "5555:5555"
    volumes:
      - ./backend:/app
    working_dir: /app
    depends_on:
      redis:
        condition: service_healthy
    command: >
      sh -c "pip install -q -e . &&
             celery -A app.core.celery:celery_app flower --address=0.0.0.0 --port=5555"

  frontend:
    image: node:20-bookworm-slim
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: >
      sh -c "npm install &&
             npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  vivindis_pgdata:
  frontend_node_modules:
